services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - lobechat
      - sync-service
    restart: unless-stopped

  lobechat:
    image: lobehub/lobe-chat:latest
    env_file:
      - .env
    expose:
      - "3210"
    restart: unless-stopped

  sync-service:
    build:
      context: ./sync-service
    env_file:
      - .env
    volumes:
      - ./data:/data
    expose:
      - "8000"
    restart: unless-stopped
